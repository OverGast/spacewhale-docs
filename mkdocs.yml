site_name: SpaceWhale Docs
site_description: Documentation for SpaceWhale Unity Editor tools.
site_url: https://overgast.github.io/spacewhale-docs/
repo_url: https://github.com/OverGast/Hierarchy-Inspector
repo_name: OverGast/Hierarchy-Inspector
copyright: Copyright &copy; SpaceWhale

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/repo-link.js

plugins:
  - search

nav:
  - Home: index.md
  - Hierarchy Inspector:
      - Overview: hierarchy-inspector/index.md
      - Getting Started: hierarchy-inspector/getting-started.md
      - Features:
          - The Gear Popup: hierarchy-inspector/features/gear-popup.md
          - Virtualization Folders: hierarchy-inspector/features/folders.md
          - Bookmarks: hierarchy-inspector/features/bookmarks.md
          - Copy & Paste Style: hierarchy-inspector/features/style-clipboard.md
          - Themes & Preferences: hierarchy-inspector/features/themes.md
      - Theme Reference:
          - Rows Tab: hierarchy-inspector/theme/rows.md
          - Icons Tab: hierarchy-inspector/theme/icons.md
          - Indicators Tab: hierarchy-inspector/theme/indicators.md
          - Customization Tab: hierarchy-inspector/theme/customization.md
      - Keyboard Shortcuts: hierarchy-inspector/shortcuts.md
      - Support: hierarchy-inspector/support.md
  - Profiler Decorator:
      - Overview: profiler-decorator/index.md
      - Getting Started: profiler-decorator/getting-started.md
      - Features:
          - The Profile Attribute: profiler-decorator/features/profile-attribute.md
          - The Profiler Window: profiler-decorator/features/profiler-window.md
          - The Frame Graph: profiler-decorator/features/frame-graph.md
          - The Manual API: profiler-decorator/features/manual-api.md
      - Support: profiler-decorator/support.md
